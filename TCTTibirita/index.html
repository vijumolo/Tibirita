  <style>
    :root {
      --red: #E31E24;
      --green: #1B7E3B;
      --dark: #111214;
      --gray: #1e2127;
      --gray2: #272b33;
      --gray3: #31363f;
      --light: #c8cdd6;
      --muted: #6b7280;
      --white: #f5f6fa;
      --gold: #f5c518;
      --silver: #b0bec5;
      --bronze: #cd7f32;
      --dnf: #4b1313;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #0c0e11 0%, #181c22 60%, #1a0204 100%);
      border-bottom: 3px solid var(--red);
      padding: 18px 24px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(6px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo-wrap img {
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(227, 30, 36, .5));
    }

    .event-info {
      flex: 1;
      min-width: 220px;
    }

    .event-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.1;
      color: var(--white);
    }

    .event-title span {
      color: var(--red);
    }

    .event-subtitle {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stats-bar {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--gray2);
      border: 1px solid var(--gray3);
      border-radius: 8px;
      padding: 6px 14px;
      min-width: 80px;
    }

    .stat-val {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--red);
    }

    .stat-lbl {
      font-size: .62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── FILTERS ─────────────────────────────────── */
    .filters-section {
      background: var(--gray);
      border-bottom: 1px solid var(--gray3);
      padding: 16px 24px;
    }

    .filters-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 150px;
    }

    .filter-group label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
    }

    .filter-group input,
    .filter-group select {
      background: var(--gray2);
      border: 1px solid var(--gray3);
      color: var(--white);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .88rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--red);
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
      white-space: nowrap;
      align-self: flex-end;
    }

    .btn-clear:hover {
      background: var(--red);
      color: #fff;
    }

    /* ── TABS ────────────────────────────────────── */
    .tabs-section {
      background: var(--gray);
      padding: 0 24px;
      border-bottom: 2px solid var(--gray3);
      overflow-x: auto;
    }

    .tabs-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .tab-btn:hover {
      color: var(--white);
    }

    .tab-btn.active {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    /* ── MAIN ────────────────────────────────────── */
    main {
      flex: 1;
      padding: 24px;
    }

    .main-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .results-count {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .results-count strong {
      color: var(--white);
    }

    /* ── CATEGORY BLOCK ─────────────────────────── */
    .category-block {
      margin-bottom: 36px;
      background: var(--gray);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--gray3);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: linear-gradient(90deg, rgba(227, 30, 36, .15) 0%, rgba(27, 126, 59, .07) 100%);
      border-bottom: 1px solid var(--gray3);
    }

    .cat-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .cat-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cat-badge {
      font-size: .7rem;
      background: var(--gray2);
      border: 1px solid var(--gray3);
      color: var(--muted);
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .cat-count {
      margin-left: auto;
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── TABLE ───────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }

    thead tr {
      background: var(--gray3);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: .67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
    }

    th:first-child {
      text-align: center;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      transition: background .15s;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, .04);
    }

    tbody tr.dnf-row {
      background: rgba(75, 19, 19, .35);
      opacity: .75;
    }

    tbody tr.dnf-row:hover {
      background: rgba(75, 19, 19, .5);
    }

    td {
      padding: 10px 14px;
      color: var(--light);
    }

    td:first-child {
      text-align: center;
    }

    .pos-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-weight: 800;
      font-size: .85rem;
    }

    .pos-1 {
      background: rgba(245, 197, 24, .15);
      color: var(--gold);
      border: 2px solid var(--gold);
    }

    .pos-2 {
      background: rgba(176, 190, 197, .12);
      color: var(--silver);
      border: 2px solid var(--silver);
    }

    .pos-3 {
      background: rgba(205, 127, 50, .15);
      color: var(--bronze);
      border: 2px solid var(--bronze);
    }

    .pos-other {
      background: var(--gray3);
      color: var(--muted);
      font-weight: 600;
    }

    .pos-dnf {
      color: #e55;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .plate {
      display: inline-block;
      background: var(--gray3);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 6px;
      padding: 2px 9px;
      font-weight: 700;
      font-size: .88rem;
      color: var(--white);
      letter-spacing: .5px;
    }

    .participant-name {
      font-weight: 600;
      color: var(--white);
    }

    .time-val {
      font-family: monospace;
      font-size: .92rem;
      color: var(--green);
      font-weight: 700;
    }

    .time-diff {
      font-size: .78rem;
      color: var(--muted);
      font-family: monospace;
    }

    .time-na {
      color: var(--muted);
      font-style: italic;
      font-size: .8rem;
    }

    .vueltas-badge {
      display: inline-block;
      background: rgba(27, 126, 59, .15);
      border: 1px solid rgba(27, 126, 59, .3);
      color: var(--green);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: .75rem;
      font-weight: 700;
    }

    .btn-bajar {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
    }

    .btn-bajar:hover {
      background: #c0151a;
      transform: translateY(-1px);
    }

    .btn-bajar:active {
      transform: translateY(1px);
    }

    .btn-bajar:disabled {
      background: var(--gray3);
      cursor: not-allowed;
      transform: none;
      color: var(--muted);
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;

      padding: 20px 24px;

      color: var(--green);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .footer-sub {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .footer-sub a {
      color: var(--red);
      text-decoration: none;
    }

    .footer-sub a:hover {
      text-decoration: underline;
    }

    /* ── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 640px) {

      main {

        padding-right: 12px;
      }

      .stat {

        padding: 5px 10px;
      }

      th,
      td {
        padding: 8px 10px;
      }

      .logo-wrap img {
        height: 54px;
      }
    }
  </style>
</head>

    // ── State ─────────────────────────────────────────
    let activeCategory = "all";
    let filters = { nombre: "", placa: "", ciudad: "", pais: "", estado: "" };

    // ── Total participants ─────────────────────────────
    const total = categories.reduce((s, c) => s + c.participants.length, 0);
    document.getElementById("totalParticipants").textContent = total;

    // ── Build tabs ─────────────────────────────────────
    function buildTabs() {
      const container = document.getElementById("tabsContainer");
      container.innerHTML = "";

      const allBtn = document.createElement("button");
      allBtn.className = "tab-btn" + (activeCategory === "all" ? " active" : "");
      allBtn.textContent = "Todas";
      allBtn.onclick = () => { activeCategory = "all"; build(); };
      container.appendChild(allBtn);

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (activeCategory === cat.id ? " active" : "");
        btn.textContent = cat.name + " – " + cat.badge;
        btn.onclick = () => { activeCategory = cat.id; build(); };
        container.appendChild(btn);
      });
    }

    // ── Filter logic ───────────────────────────────────
    function matchesFilters(p) {
      const n = filters.nombre.toLowerCase();
      const pl = filters.placa;
      const c = filters.ciudad.toLowerCase();
      const pa = filters.pais;
      const est = filters.estado;
      const isDNF = p.pos === "DNF";

      if (n && !p.name.toLowerCase().includes(n)) return false;
      if (pl && !String(p.plate).includes(pl)) return false;
      if (c && !p.ciudad.toLowerCase().includes(c)) return false;
      if (pa && !p.pais.includes(pa.replace("COL", "COL").replace("ITA", "ITA"))) return false;
      if (pa === "COL" && p.pais !== "COL") return false;
      if (pa === "ITA" && p.pais !== "ITA") return false;
      if (est === "finisher" && isDNF) return false;
      if (est === "dnf" && !isDNF) return false;
      return true;
    }

    // ── Render ─────────────────────────────────────────
    function renderCategory(cat) {
      const participants = cat.participants.filter(matchesFilters);
      if (participants.length === 0) return null;

      const block = document.createElement("div");
      block.className = "category-block";

      block.innerHTML = `
    <div class="category-header">
      <div class="cat-icon" style="background:${cat.color}22; border:2px solid ${cat.color}55; color:${cat.color}">
        ${cat.icon}
      </div>
      <div>
        <div class="cat-name" style="color:${cat.color}">${cat.name}</div>
        <span class="cat-badge">${cat.badge}</span>
      </div>
      <div class="cat-count">${participants.length} participant${participants.length !== 1 ? "es" : "e"}</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Pos.</th>
            <th>Placa</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>País</th>
            <th style="text-align:center">Vueltas</th>
            <th>Tiempo</th>
            <th>Diferencia</th>
            <th style="text-align:center">Diploma</th>
          </tr>
        </thead>
        <tbody>
          ${participants.map(p => renderRow(p, cat.id)).join("")}
        </tbody>
      </table>
    </div>
  `;
      return block;
    }

    function posBadge(pos) {
      if (pos === "DNF") return `<span class="pos-dnf">DNF</span>`;
      if (pos === 1) return `<span class="pos-badge pos-1">1</span>`;
      if (pos === 2) return `<span class="pos-badge pos-2">2</span>`;
      if (pos === 3) return `<span class="pos-badge pos-3">3</span>`;
      return `<span class="pos-badge pos-other">${pos}</span>`;
    }

    function paisFlag(pais) {
      if (pais === "ITA") return "🇮🇹 ITA";
      return "🇨🇴 COL";
    }

    function renderRow(p, catId) {
      const isDNF = p.pos === "DNF";
      const isMaravillas = catId.includes("maravillas");

      const tiempo = isDNF
        ? `<span class="time-na">—</span>`
        : `<span class="time-val">${p.tiempo}</span>`;
      const dif = isDNF || p.dif === "--"
        ? `<span class="time-na">—</span>`
        : `<span class="time-diff">${p.dif}</span>`;
      const vueltas = isDNF
        ? `<span class="time-na">—</span>`
        : `<span class="vueltas-badge">${p.vueltas}</span>`;

      const btnBajar = isDNF
        ? `<span class="time-na" style="display:block;text-align:center">N/A</span>`
        : `<button class="btn-bajar" onclick="descargarDiploma('${p.name}', ${isMaravillas}, this)" title="Descargar diploma original">PDF ⬇️</button>`;

      return `<tr class="${isDNF ? "dnf-row" : ""}">
    <td>${posBadge(p.pos)}</td>
    <td><span class="plate">${p.plate}</span></td>
    <td><span class="participant-name">${p.name}</span></td>
    <td>${p.ciudad}</td>
    <td style="white-space:nowrap">${paisFlag(p.pais)}</td>
    <td style="text-align:center">${vueltas}</td>
    <td>${tiempo}</td>
    <td>${dif}</td>
    <td style="text-align:center; vertical-align:middle;">${btnBajar}</td>
  </tr>`;
    }

    function build() {
      buildTabs();
      const container = document.getElementById("resultsContainer");
      container.innerHTML = "";

      const catsToRender = activeCategory === "all"
        ? categories
        : categories.filter(c => c.id === activeCategory);

      let totalShown = 0;
      let rendered = 0;

      catsToRender.forEach(cat => {
        const el = renderCategory(cat);
        if (el) {
          container.appendChild(el);
          totalShown += cat.participants.filter(matchesFilters).length;
          rendered++;
        }
      });

      if (rendered === 0) {
        container.innerHTML = `
      <div class="no-results">
        <div class="icon">🏔️</div>
        <p>No se encontraron participantes con ese criterio de búsqueda.</p>
      </div>`;
      }

      document.getElementById("resultsCount").innerHTML =
        `Mostrando <strong>${totalShown}</strong> participante${totalShown !== 1 ? "s" : ""} de <strong>${total}</strong> en total`;
    }

    // ── Wire filters ───────────────────────────────────
    function wireFilter(id, key) {
      document.getElementById(id).addEventListener("input", e => {
        filters[key] = e.target.value.trim();
        activeCategory = "all";
        build();
      });
    }

    wireFilter("fNombre", "nombre");
    wireFilter("fPlaca", "placa");
    wireFilter("fCiudad", "ciudad");

    document.getElementById("fPais").addEventListener("change", e => {
      filters.pais = e.target.value;
      activeCategory = "all";
      build();
    });
    document.getElementById("fEstado").addEventListener("change", e => {
      filters.estado = e.target.value;
      activeCategory = "all";
      build();
    });

    function clearFilters() {
      filters = { nombre: "", placa: "", ciudad: "", pais: "", estado: "" };
      document.getElementById("fNombre").value = "";
      document.getElementById("fPlaca").value = "";
      document.getElementById("fCiudad").value = "";
      document.getElementById("fPais").value = "";
      document.getElementById("fEstado").value = "";
      activeCategory = "all";
      build();
    }

    // ── Init ───────────────────────────────────────────
    build();

    // ── Diploma Logic ──────────────────────────────────
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function removeAccents(str) {
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    window.descargarDiploma = async function (nombre, isMaravillas, btnElement) {
      const originalText = btnElement.innerHTML;
      btnElement.innerHTML = "⏳ Buscando...";
      btnElement.disabled = true;

      try {
        const pdfUrl = isMaravillas ? 'Diplomas/MARAVILLAS.pdf' : 'Diplomas/EXPLORADORES.pdf';

        // 1. Fetch PDF bytes
        const pdfBytesResponse = await fetch(pdfUrl);
        if (!pdfBytesResponse.ok) {
          throw new Error("No se pudo cargar el archivo PDF original de diplomas. Asegúrese de que existe en: " + pdfUrl);
        }
        const pdfBuffer = await pdfBytesResponse.arrayBuffer();

        // 2. Load with PDF.js to search text
        btnElement.innerHTML = "⏳ Extrayendo...";
        const pdfDocjs = await pdfjsLib.getDocument({ data: pdfBuffer }).promise;

        let targetPageNum = -1;
        const normalizedTargetName = removeAccents(nombre.replace(/\s+/g, ' ').toLowerCase().trim());

        for (let i = 1; i <= pdfDocjs.numPages; i++) {
          const page = await pdfDocjs.getPage(i);
          const textContent = await page.getTextContent();
          const text = textContent.items.map(s => s.str).join(' ');

          const normalizedText = removeAccents(text.replace(/\s+/g, ' ').toLowerCase());

          if (normalizedText.includes(normalizedTargetName)) {
            if (text.includes('/-1')) {
              // It's marked as invalid
              break;
            } else {
              targetPageNum = i;
              break;
            }
          }
        }

        if (targetPageNum === -1) {
          alert("No se encontró un diploma válido para: " + nombre);
          btnElement.innerHTML = originalText;
          btnElement.disabled = false;
          return;
        }

        // 3. Extract page using pdf-lib
        btnElement.innerHTML = "⏳ Generando...";
        const { PDFDocument } = window.PDFLib;
        const pdfLibDoc = await PDFDocument.load(pdfBuffer);
        const newPdf = await PDFDocument.create();
        const [copiedPage] = await newPdf.copyPages(pdfLibDoc, [targetPageNum - 1]);
        newPdf.addPage(copiedPage);

        const pdfBytes = await newPdf.save();

        // 4. Download
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Diploma_${nombre.replace(/\s+/g, '_')}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        btnElement.innerHTML = "✅ ¡Listo!";
        setTimeout(() => {
          btnElement.innerHTML = originalText;
          btnElement.disabled = false;
        }, 3000);

      } catch (error) {
        console.error(error);
        alert("Hubo un error al generar el diploma. Nota: esta función requiere que la página se ejecute en un servidor web (no puede abrirse directamente con doble click).");
        btnElement.innerHTML = originalText;
        btnElement.disabled = false;
      }
    };
  </script>
